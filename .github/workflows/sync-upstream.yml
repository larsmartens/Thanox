name: Sync Upstream

on:
  schedule:
    - cron: "25 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/Tornaco/Thanox.git || true

      - name: Fetch upstream
        run: git fetch upstream master --tags

      - name: Check for upstream commits
        id: check
        run: |
          BEHIND=$(git rev-list HEAD..upstream/master --count)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          echo "Upstream is $BEHIND commit(s) ahead"

      - name: Capture fork baseline
        id: base
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Merge upstream
        if: steps.check.outputs.behind != '0'
        run: |
          git merge upstream/master --no-edit -X ours || {
            git diff --name-only --diff-filter=U > conflicts.txt
            while IFS= read -r path; do
              [ -n "$path" ] || continue
              case "$path" in
                .github/workflows/*)
                  git restore --source="${{ steps.base.outputs.sha }}" --staged --worktree -- "$path" 2>/dev/null || git rm -f -- "$path"
                  ;;
                *)
                  git checkout --ours -- "$path" 2>/dev/null || git rm -f -- "$path"
                  ;;
              esac
            done < conflicts.txt
            rm -f conflicts.txt
            git add -A
            git commit --no-edit
          }

      - name: Re-apply fork update URLs
        if: steps.check.outputs.behind != '0'
        run: |
          sed -i 's|raw.githubusercontent.com/Tornaco/Thanox/master|raw.githubusercontent.com/larsmartens/Thanox/master|g' \
            android/android_framework/base/build.gradle.kts

          if ! git diff --quiet; then
            git add android/android_framework/base/build.gradle.kts
            git commit -m "chore: re-apply fork update urls after upstream sync"
          fi

      - name: Restore fork workflows
        if: steps.check.outputs.behind != '0'
        run: |
          git restore --source="${{ steps.base.outputs.sha }}" --staged --worktree .github/workflows || true
          if ! git diff --quiet -- .github/workflows; then
            git add .github/workflows
            git commit -m "chore: preserve fork workflows after upstream sync"
          fi

      - name: Setup Java
        if: steps.check.outputs.behind != '0'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Android SDK
        if: steps.check.outputs.behind != '0'
        uses: android-actions/setup-android@v3

      - name: Build magisk module
        if: steps.check.outputs.behind != '0'
        working-directory: android
        run: |
          chmod +x gradlew scripts/build_magisk_patch.sh
          ./scripts/build_magisk_patch.sh

      - name: Update fork manifest
        if: steps.check.outputs.behind != '0'
        id: manifest
        run: |
          RELEASE_ZIP=$(find android/out -type f -name '*.zip' | head -1)
          RELEASE_BASENAME=$(basename "$RELEASE_ZIP")
          VERSION=$(unzip -p "$RELEASE_ZIP" module.prop | sed -n 's/^version=//p' | head -1)
          VERSION_CODE=$(unzip -p "$RELEASE_ZIP" module.prop | sed -n 's/^versionCode=//p' | head -1)

          cat > android/android_framework/patch-magisk/update.json <<EOF
          {
            "version": "${VERSION}",
            "versionCode": ${VERSION_CODE},
            "zipUrl": "https://github.com/larsmartens/Thanox/releases/download/${VERSION}/${RELEASE_BASENAME}",
            "changelog": "https://raw.githubusercontent.com/larsmartens/Thanox/master/android/android_framework/patch-magisk/changelog.md"
          }
          EOF

          echo "release_zip=${RELEASE_ZIP}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Commit updated manifest
        if: steps.check.outputs.behind != '0'
        run: |
          git add android/android_framework/patch-magisk/update.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update fork magisk manifest"
          fi

      - name: Push synced branch
        if: steps.check.outputs.behind != '0'
        run: git push origin master

      - name: Create release
        if: steps.check.outputs.behind != '0'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.manifest.outputs.version }}
          name: ${{ steps.manifest.outputs.version }}
          prerelease: true
          make_latest: true
          files: ${{ steps.manifest.outputs.release_zip }}
